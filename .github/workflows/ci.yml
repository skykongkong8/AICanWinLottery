name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes and live NIM quota.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-contracts:
    name: prepare-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup uv (Python agent toolchain)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Python agent dependencies
        run: uv sync --project apps/agent

      - name: Generate contracts and fail on drift
        run: pnpm ci:prepare

  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: prepare-contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup uv (Python agent toolchain)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Python agent dependencies
        run: uv sync --project apps/agent

      - name: Unit checks (TS, lint, JS tests, coverage, Python non-live)
        run: pnpm ci:unit

  integration:
    name: integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup uv (Python agent toolchain)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Python agent dependencies
        run: uv sync --project apps/agent

      - name: Integration checks (API endpoints and agent HTTP boundaries)
        run: pnpm ci:integration

  live-nim:
    name: live-nim
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: integration
    steps:
      - name: Policy block for untrusted PRs
        if: ${{ github.event_name == 'pull_request' && (github.event.pull_request.head.repo.full_name != github.repository || github.actor == 'dependabot[bot]') }}
        run: |
          echo "::error::live-nim requires repository secrets and is only run on trusted same-repository branches. Maintainers should promote reviewed fork changes to a trusted branch or run a reviewed manual workflow."
          exit 1

      - name: Checkout
        if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup uv (Python agent toolchain)
        if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install JS dependencies
        if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
        run: pnpm install --frozen-lockfile

      - name: Sync Python agent dependencies
        if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
        run: uv sync --project apps/agent

      - name: Require NVIDIA_NIM_KEY secret
        if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
        env:
          NVIDIA_NIM_KEY: ${{ secrets.NVIDIA_NIM_KEY }}
        run: |
          if [ -z "${NVIDIA_NIM_KEY:-}" ]; then
            echo "::error::NVIDIA_NIM_KEY repository secret is required for live-nim. Configure it from local ./NVIDIA_NIM_KEY without printing the value."
            exit 1
          fi

      - name: Live NVIDIA NIM tests
        if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
        env:
          NVIDIA_NIM_KEY: ${{ secrets.NVIDIA_NIM_KEY }}
          NVIDIA_API_KEY: ""
          NVIDIA_NIM_KEY_FILE: /tmp/aicanwinlottery-nvidia-nim-key-file-disabled
          NVIDIA_MODEL: z-ai/glm-5.1
          NIM_CALL_TIMEOUT_SECONDS: "15"
          NIM_MAX_TOKENS: "700"
        run: pnpm ci:live-nim

  cd-readiness:
    name: cd-readiness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build readiness artifacts (no deployment target configured)
        run: pnpm ci:readiness

      - name: Upload build readiness artifact
        uses: actions/upload-artifact@v4
        with:
          name: cd-readiness-build
          if-no-files-found: ignore
          path: |
            apps/api/dist/
            apps/web/dist/
            packages/*/dist/
